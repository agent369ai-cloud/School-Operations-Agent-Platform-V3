# Render Blueprint — School Operations Agent Platform
# Deploy at: https://dashboard.render.com/blueprints → "New Blueprint Instance"
# Connect to repo: agent369ai-cloud/School-Operations-Agent-Platform-V3

databases:
  - name: school-ops-db
    databaseName: schoolops
    user: schoolops
    plan: free          # upgrade to starter for persistent storage in prod

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: school-ops-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-ops-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true           # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_MODE
        value: auto
      - key: LLM_PROVIDER
        value: gemini                 # change to groq if you prefer
      - key: GEMINI_API_KEY
        sync: false                   # set this manually in the Render dashboard
      - key: GROQ_API_KEY
        sync: false                   # set if using groq provider
      - key: CORS_ORIGINS
        sync: false   # set manually after frontend deploys: https://school-ops-frontend.onrender.com
      - key: CHANNEL_MODE
        value: mock
      - key: UPLOAD_DIR
        value: /tmp/uploads           # ephemeral on free tier; use a Render Disk for persistence
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  - type: web
    name: school-ops-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        sync: false   # set manually after backend deploys: https://school-ops-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
