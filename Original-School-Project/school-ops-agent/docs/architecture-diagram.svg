<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f4e8c"/>
    </marker>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #1f4e8c; }
      .flow  { font-size: 14px; font-weight: 600; fill: #1f4e8c; }
      .lhdr  { font-size: 12.5px; font-weight: 700; fill: #1f4e8c; }
      .num   { font-size: 12px; font-weight: 700; fill: #ffffff; }
      .item  { font-size: 10.5px; fill: #20303f; }
      .leg   { font-size: 11px; fill: #20303f; }
      .note  { font-size: 11px; fill: #5a6b78; }
      .box   { fill: #ffffff; stroke: #1f4e8c; stroke-width: 1.6; rx: 8; }
      .cross { fill: #f3f7fd; stroke: #1f4e8c; stroke-width: 1.6; }
    </style>
  </defs>

  <!-- Title -->
  <text x="590" y="34" text-anchor="middle" class="title">School Operations Agent Platform — Architecture</text>
  <text x="590" y="58" text-anchor="middle" class="flow">Chat / Web Request  →  Auth &amp; Scope  →  Intent / Parse  →  Validate &amp; Approve  →  Deterministic Action  →  Audited Response</text>

  <!-- Legend -->
  <g transform="translate(40,74)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#ffffff" stroke="#1f4e8c" stroke-width="1.6"/>
    <text x="20" y="11" class="leg">Built &amp; verified</text>
    <rect x="150" y="0" width="14" height="14" rx="3" fill="#fff6e6" stroke="#c98a1b" stroke-width="1.6"/>
    <text x="170" y="11" class="leg">Partial (scoped)</text>
    <rect x="300" y="0" width="14" height="14" rx="3" fill="#f0f0f0" stroke="#9aa6b0" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="320" y="11" class="leg">Future / bonus (not built)</text>
  </g>

  <!-- ===== Top row layers ===== -->
  <!-- 1 User Experience -->
  <g transform="translate(40,108)">
    <rect class="box" width="150" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">1</text>
    <text x="32" y="16" class="lhdr">USER</text><text x="32" y="30" class="lhdr">EXPERIENCE</text>
    <text x="12" y="58" class="item">• Web app (Next.js)</text>
    <text x="12" y="78" class="item">• Admin / Teacher /</text>
    <text x="12" y="92" class="item">  Student dashboards</text>
    <text x="12" y="112" class="item">• Telegram chatbot</text>
    <text x="12" y="132" class="item">• Document upload</text>
    <text x="12" y="152" class="item">• Image upload (OCR</text>
    <text x="12" y="166" class="item">  hook)</text>
  </g>

  <!-- 2 API Gateway & Security -->
  <g transform="translate(208,108)">
    <rect class="box" width="150" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">2</text>
    <text x="32" y="16" class="lhdr">API &amp; SECURITY</text><text x="32" y="30" class="lhdr">LAYER (FastAPI)</text>
    <text x="12" y="58" class="item">• Auth (JWT, expiry)</text>
    <text x="12" y="78" class="item">• Authorization / RBAC</text>
    <text x="12" y="92" class="item">  (policy engine)</text>
    <text x="12" y="112" class="item">• Tenancy scope check</text>
    <text x="12" y="132" class="item">• Rate limiting</text>
    <text x="12" y="152" class="item">• Correlation-id +</text>
    <text x="12" y="166" class="item">  request validation</text>
  </g>

  <!-- 3 Orchestrator -->
  <g transform="translate(376,108)">
    <rect class="box" width="150" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">3</text>
    <text x="32" y="16" class="lhdr">AGENT</text><text x="32" y="30" class="lhdr">ORCHESTRATOR</text>
    <text x="12" y="58" class="item">• Channel dispatcher</text>
    <text x="12" y="78" class="item">• Intent router</text>
    <text x="12" y="98" class="item">• Context builder</text>
    <text x="12" y="112" class="item">  (AuthContext)</text>
    <text x="12" y="132" class="item">• Prompt builder</text>
    <text x="12" y="146" class="item">  (injection-guarded)</text>
    <text x="12" y="166" class="item">• Error / fallback</text>
  </g>

  <!-- 4 LLM Layer -->
  <g transform="translate(544,108)">
    <rect class="box" width="150" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">4</text>
    <text x="32" y="16" class="lhdr">LLM LAYER</text>
    <text x="12" y="50" class="item">• Provider-agnostic</text>
    <text x="12" y="64" class="item">  client</text>
    <text x="12" y="84" class="item">• Anthropic / OpenAI</text>
    <text x="12" y="104" class="item">• Deterministic mock</text>
    <text x="12" y="118" class="item">  fallback (offline)</text>
    <text x="12" y="138" class="item">• Intent classify</text>
    <text x="12" y="158" class="item">• Field extraction</text>
  </g>

  <!-- 7 Tool / Action calling -->
  <g transform="translate(712,108)">
    <rect class="box" width="158" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">7</text>
    <text x="32" y="16" class="lhdr">TOOL / ACTION</text><text x="32" y="30" class="lhdr">LAYER</text>
    <text x="12" y="58" class="item">• Deterministic service</text>
    <text x="12" y="72" class="item">  handlers (the "tools")</text>
    <text x="12" y="92" class="item">• Assignment / submission</text>
    <text x="12" y="106" class="item">  state machines</text>
    <text x="12" y="126" class="item">• Reminder engine</text>
    <text x="12" y="146" class="item">• DB (SQLite / Postgres)</text>
    <rect x="8" y="156" width="142" height="18" rx="4" fill="#fff6e6" stroke="#c98a1b" stroke-width="1.2"/>
    <text x="14" y="169" class="item" fill="#8a5e10">no MCP / agent gateway</text>
  </g>

  <!-- Validation checkpoint (between 7 and 8) -->
  <g transform="translate(888,150)">
    <path d="M30 8 L58 20 L58 52 Q58 78 30 96 Q2 78 2 52 L2 20 Z" class="cross"/>
    <text x="30" y="44" text-anchor="middle" class="lhdr">CHECK</text>
    <text x="30" y="60" text-anchor="middle" class="item">Validate</text>
    <text x="30" y="73" text-anchor="middle" class="item">+ Approve</text>
    <text x="30" y="120" text-anchor="middle" class="note">Pydantic +</text>
    <text x="30" y="133" text-anchor="middle" class="note">human gate +</text>
    <text x="30" y="146" text-anchor="middle" class="note">state rules</text>
  </g>

  <!-- 8 Response & Action -->
  <g transform="translate(978,108)">
    <rect class="box" width="160" height="180"/>
    <circle cx="16" cy="18" r="9" fill="#1f4e8c"/><text x="16" y="22" text-anchor="middle" class="num">8</text>
    <text x="32" y="16" class="lhdr">RESPONSE &amp;</text><text x="32" y="30" class="lhdr">ACTION</text>
    <text x="12" y="58" class="item">• Assignment created</text>
    <text x="12" y="78" class="item">• Feedback / revision</text>
    <text x="12" y="98" class="item">• Reminder sent</text>
    <text x="12" y="118" class="item">• Roster imported</text>
    <text x="12" y="138" class="item">• Live dashboard (SSE)</text>
    <text x="12" y="158" class="item">• Chat reply</text>
  </g>

  <!-- Flow arrows top row -->
  <g stroke="#1f4e8c" stroke-width="1.8" fill="none">
    <line x1="190" y1="198" x2="206" y2="198" marker-end="url(#arrow)"/>
    <line x1="358" y1="198" x2="374" y2="198" marker-end="url(#arrow)"/>
    <line x1="526" y1="198" x2="542" y2="198" marker-end="url(#arrow)"/>
    <line x1="694" y1="198" x2="710" y2="198" marker-end="url(#arrow)"/>
    <line x1="870" y1="198" x2="886" y2="198" marker-end="url(#arrow)"/>
    <line x1="950" y1="198" x2="976" y2="198" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== Middle row: 5 RAG, 6 Memory, Audit ===== -->
  <!-- 5 RAG (future) -->
  <g transform="translate(208,320)">
    <rect class="box" width="230" height="120" fill="#f0f0f0" stroke="#9aa6b0" stroke-dasharray="5 3"/>
    <circle cx="16" cy="18" r="9" fill="#9aa6b0"/><text x="16" y="22" text-anchor="middle" class="num">5</text>
    <text x="32" y="22" class="lhdr" fill="#5a6b78">RAG &amp; KNOWLEDGE (future / bonus)</text>
    <text x="12" y="48" class="item" fill="#5a6b78">• Document store ✓ (built)</text>
    <text x="12" y="68" class="item" fill="#5a6b78">• Embeddings / vector DB ✗</text>
    <text x="12" y="88" class="item" fill="#5a6b78">• Retrieval / re-ranking ✗</text>
    <text x="12" y="108" class="item" fill="#5a6b78">• Q&amp;A over policy docs ✗</text>
  </g>

  <!-- 6 Memory (partial) -->
  <g transform="translate(456,320)">
    <rect class="box" width="238" height="120" fill="#fff6e6" stroke="#c98a1b"/>
    <circle cx="16" cy="18" r="9" fill="#c98a1b"/><text x="16" y="22" text-anchor="middle" class="num">6</text>
    <text x="32" y="22" class="lhdr" fill="#8a5e10">MEMORY / STATE (partial)</text>
    <text x="12" y="48" class="item" fill="#6b4e10">• Session (JWT) ✓</text>
    <text x="12" y="68" class="item" fill="#6b4e10">• Workflow state (state machines) ✓</text>
    <text x="12" y="88" class="item" fill="#6b4e10">• User/resource context ✓</text>
    <text x="12" y="108" class="item" fill="#6b4e10">• Long-term / convo memory ✗</text>
  </g>

  <!-- Audit log -->
  <g transform="translate(978,320)">
    <rect class="box" width="160" height="120"/>
    <text x="12" y="22" class="lhdr">AUDIT LOG</text>
    <text x="12" y="46" class="item">Append-only,</text>
    <text x="12" y="62" class="item">PII-screened log of</text>
    <text x="12" y="78" class="item">every request, action,</text>
    <text x="12" y="94" class="item">and decision — tied by</text>
    <text x="12" y="110" class="item">correlation id.</text>
  </g>

  <!-- arrows from orchestrator/LLM down to RAG/memory -->
  <g stroke="#1f4e8c" stroke-width="1.6" fill="none" stroke-dasharray="4 3">
    <line x1="451" y1="288" x2="400" y2="318" marker-end="url(#arrow)"/>
    <line x1="600" y1="288" x2="580" y2="318" marker-end="url(#arrow)"/>
  </g>
  <!-- action layer to audit -->
  <g stroke="#1f4e8c" stroke-width="1.6" fill="none">
    <line x1="1058" y1="288" x2="1058" y2="318" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== Bottom cross-cutting: 9 Governance ===== -->
  <g transform="translate(40,470)">
    <rect class="box" width="1098" height="92"/>
    <circle cx="20" cy="22" r="10" fill="#1f4e8c"/><text x="20" y="26" text-anchor="middle" class="num">9</text>
    <text x="40" y="27" class="lhdr">GOVERNANCE, GUARDRAILS &amp; OBSERVABILITY (cross-cutting)</text>

    <g class="item">
      <text x="40" y="56">✓ Authz guardrails</text>
      <text x="190" y="56">✓ PII screening</text>
      <text x="330" y="56">✓ Audit log</text>
      <text x="450" y="56">✓ Human approval gate</text>
      <text x="640" y="56">✓ Correlation-id tracing</text>
      <text x="840" y="56">✓ Structured logs</text>

      <text x="40" y="78">✓ Injection defense</text>
      <text x="190" y="78">✓ Idempotency</text>
      <text x="330" y="78">✓ Rate limiting</text>
    </g>
    <g class="item" fill="#8a5e10">
      <text x="450" y="78">◐ Tests/evals (no live metrics)</text>
      <text x="640" y="78">✗ Cost monitoring</text>
      <text x="840" y="78">✗ Live model-eval / OTel traces</text>
    </g>
  </g>

  <!-- vertical governance ties -->
  <g stroke="#1f4e8c" stroke-width="1.4" fill="none" stroke-dasharray="3 3">
    <line x1="115" y1="288" x2="115" y2="468"/>
    <line x1="590" y1="440" x2="590" y2="468"/>
    <line x1="1058" y1="440" x2="1058" y2="468"/>
  </g>

  <!-- footer note -->
  <g transform="translate(40,580)">
    <rect x="0" y="0" width="1098" height="58" rx="8" fill="#f3f7fd" stroke="#1f4e8c" stroke-width="1.2"/>
    <text x="16" y="24" class="note" font-weight="700" fill="#1f4e8c">Scope note:</text>
    <text x="100" y="24" class="note">The LLM is one part. This take-home builds the production-shaped SLICE — orchestration, auth, parsing, validation, governance — fully.</text>
    <text x="16" y="44" class="note">Dashed/amber items (RAG, long-term memory, MCP, cost/eval metrics) are the assignment's explicit bonuses or out-of-scope, deliberately deferred and documented in the README + ADRs.</text>
  </g>
</svg>
